<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tommy.Dev</title>
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF8;--sf:#FFF;--tx:#1A1A1A;--ts:#5A5A5A;--tm:#8A8A8A;--ac:#2563EB;--al:#DBEAFE;--ad:#1D4ED8;--bd:#E8E8E4;--bl:#F0F0EC;--tb:#F1F5F9;--tt:#475569;--ok:#059669;--okbg:#ECFDF5;--s1:0 1px 3px rgba(0,0,0,.04);--s2:0 4px 20px rgba(0,0,0,.06);--r:16px;--rs:10px}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Noto Sans TC','Microsoft JhengHei','PingFang TC',sans-serif;background:var(--bg);color:var(--tx);line-height:1.8;-webkit-font-smoothing:antialiased}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,250,248,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--bl);transition:box-shadow .3s}
nav.scrolled{box-shadow:var(--s1)}
.ni{max-width:880px;margin:0 auto;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between}
.nl{font-weight:700;font-size:1rem}.nl span{color:var(--ac)}
.nk{display:flex;gap:32px}.nk a{text-decoration:none;color:var(--ts);font-size:.85rem;font-weight:500;position:relative}
.nk a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--ac);transition:width .25s}
.nk a:hover{color:var(--tx)}.nk a:hover::after{width:100%}
.c{max-width:880px;margin:0 auto;padding:0 32px}
.hero{min-height:100vh;display:flex;align-items:center;padding-top:56px}
.hi{width:100%;text-align:center;animation:fu .8s ease both}
.hb{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:var(--al);color:var(--ad);border-radius:100px;font-size:.82rem;font-weight:600;margin-bottom:24px}
.hb .dot{width:7px;height:7px;background:var(--ok);border-radius:50%}
.hn{font-family:'Playfair Display',Georgia,serif;font-size:3.8rem;font-weight:700;line-height:1.15;letter-spacing:-.03em;margin-bottom:6px}
.hne{font-family:'Playfair Display',Georgia,serif;font-size:1.5rem;font-weight:600;color:var(--tm);margin-bottom:24px}
.ht{font-size:1.15rem;color:var(--ts);max-width:520px;margin:0 auto 36px;line-height:1.8}.ht strong{color:var(--tx);font-weight:600}
.hc{display:flex;justify-content:center;flex-wrap:wrap;gap:10px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:var(--sf);border:1px solid var(--bd);border-radius:100px;font-size:.82rem;color:var(--ts)}
.chip svg{width:14px;height:14px;opacity:.45}
.sh{margin-top:56px;display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--tm);font-size:.75rem;animation:bo 2s ease infinite}
.sh svg{width:20px;height:20px;opacity:.35}
.sec{padding:100px 0}
.sl{font-size:.78rem;font-weight:600;color:var(--ac);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.st{font-family:'Playfair Display',Georgia,serif;font-size:2.2rem;font-weight:700;letter-spacing:-.02em;margin-bottom:48px}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start}
.as h3{font-size:1.05rem;font-weight:700;margin-bottom:12px}
.as p{font-size:.92rem;color:var(--ts);line-height:1.85;margin-bottom:14px}.as p strong{color:var(--tx);font-weight:600}
.ab{margin-bottom:36px}.ab:last-child{margin-bottom:0}
.tv{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:32px;box-shadow:var(--s1)}
.tp{display:flex;flex-direction:column}
.ps{display:flex;align-items:flex-start;gap:16px;position:relative;padding-bottom:28px}
.ps:last-child{padding-bottom:0}
.ps:not(:last-child)::after{content:'';position:absolute;left:6px;top:18px;bottom:0;width:2px;background:linear-gradient(to bottom,var(--ac),var(--bd))}
.pn{width:14px;height:14px;border-radius:50%;flex-shrink:0;position:relative;z-index:1}
.pn.s1,.pn.s2{background:var(--bd)}.pn.s3{background:var(--ac)}
.pi .role{font-size:.9rem;font-weight:700;margin-bottom:2px}
.pi .per{font-family:'JetBrains Mono','Consolas',monospace;font-size:.72rem;color:var(--tm);margin-bottom:4px}
.pi .desc{font-size:.82rem;color:var(--ts);line-height:1.6}
.pcb{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:600;color:var(--ac);background:var(--al);padding:2px 8px;border-radius:100px;margin-top:6px}
.pcb .dot{width:5px;height:5px;background:var(--ok);border-radius:50%}
.pc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--s1)}
.pb{height:180px;background:linear-gradient(135deg,#C2410C 0%,#EA580C 50%,#F97316 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pb::before{display:none}
.pbi{position:relative;z-index:1;text-align:center;color:#fff}
.ai{width:60px;height:60px;background:rgba(255,255,255,.95);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;border:1px solid rgba(255,255,255,.2);overflow:hidden;padding:4px}
.ai img{width:100%;height:100%;object-fit:contain;border-radius:10px}
.pbi h3{font-size:1.35rem;font-weight:700}.pbi .sub{font-size:.82rem;opacity:.8;margin-top:4px}
.pbd{padding:40px}
.po{font-size:.93rem;color:var(--ts);line-height:1.85;margin-bottom:36px;max-width:720px}.po strong{color:var(--tx);font-weight:600}
.cg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:36px}
.cc{background:var(--bg);border:1px solid var(--bl);border-radius:var(--rs);padding:24px;transition:transform .2s,box-shadow .2s}
.cc:hover{transform:translateY(-2px);box-shadow:var(--s2)}
.cc .num{font-family:'Playfair Display',Georgia,serif;font-size:1.8rem;font-weight:700;color:var(--al);margin-bottom:8px}
.cc h4{font-size:.9rem;font-weight:700;margin-bottom:8px}
.cc .prob{font-size:.82rem;color:var(--tm);line-height:1.6;margin-bottom:10px}
.cc .sol{font-size:.82rem;color:var(--ts);line-height:1.6;padding-top:10px;border-top:1px solid var(--bd)}
.cc .sol strong{color:var(--ac);font-weight:600}
.pst{font-size:.8rem;font-weight:600;color:var(--tm);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
.tt{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:0;margin-top:10px}
.tg{font-family:'JetBrains Mono','Consolas',monospace;font-size:.78rem;font-weight:500;padding:6px 14px;background:var(--tb);color:var(--tt);border-radius:100px;border:1px solid var(--bl)}
.tc{background:var(--bg);border:1px solid var(--bl);border-radius:var(--rs);padding:24px;transition:transform .2s,box-shadow .2s}
.tc:hover{transform:translateY(-2px);box-shadow:var(--s2)}
.tc h4{font-size:.9rem;font-weight:700;margin-bottom:8px}
.tc p{font-size:.82rem;color:var(--ts);line-height:1.65}
.tc p strong{color:var(--tx);font-weight:600}
.rb{background:var(--okbg);border:1px solid #A7F3D0;border-radius:var(--rs);padding:20px 24px;display:flex;align-items:center;gap:12px}
.ri{width:40px;height:40px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ri svg{width:20px;height:20px;color:var(--ok)}
.rt{font-size:.9rem;color:var(--ok);font-weight:600;line-height:1.5}.rt span{display:block;font-weight:400;font-size:.82rem;color:#047857;margin-top:2px}
footer{padding:48px 0;border-top:1px solid var(--bd);text-align:center}
footer .th{font-size:1.1rem;font-weight:600;color:var(--tx);margin-bottom:6px}
footer .ct{font-size:.85rem;color:var(--tm)}
footer .mo{font-size:.8rem;color:var(--tm);font-style:italic;margin-top:16px;opacity:.7}
@keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes bo{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
.a{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}.a.v{opacity:1;transform:translateY(0)}
@media(max-width:768px){.hn{font-size:2.6rem}.ag{grid-template-columns:1fr;gap:40px}.cg{grid-template-columns:1fr}.pbd{padding:28px}.nk{gap:20px}}
@media(max-width:480px){.c{padding:0 20px}.ni{padding:0 20px}.sec{padding:72px 0}}
.vl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;cursor:pointer}
.vl-overlay.show{opacity:1}
.vl-overlay video{max-width:90vw;max-height:85vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.vl-close{position:absolute;top:20px;right:24px;color:#fff;font-size:2rem;cursor:pointer;opacity:.7;transition:opacity .2s}
.vl-close:hover{opacity:1}
.dv{cursor:pointer}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav"><div class="ni"><div class="nl" id="nav-name"></div><div class="nk" id="nav-links"></div></div></nav>

<!-- HERO -->
<section class="hero"><div class="c"><div class="hi">
  <div class="hb"><span class="dot"></span><span id="hero-badge"></span></div>
  <h1 class="hn" id="hero-name"></h1>
  <div class="hne" id="hero-name-en"></div>
  <p class="ht" id="hero-intro"></p>
  <div class="hc" id="hero-chips"></div>
  <div class="sh"><span id="hero-scroll"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
</div></div></section>

<!-- ABOUT -->
<section class="sec" id="about"><div class="c">
  <div class="sl a" id="about-label"></div>
  <h2 class="st a" id="about-title"></h2>
  <div class="ag">
    <div class="as" id="about-sections"></div>
    <div class="tv a">
      <div class="tp" id="about-timeline"></div>
    </div>
  </div>
</div></section>

<!-- PROJECTS -->
<section class="sec" id="project" style="padding-bottom:60px"><div class="c">
  <div class="sl a" id="proj-label"></div>
  <h2 class="st a" style="margin-bottom:20px" id="proj-title"></h2>
  <div class="a" style="font-size:.9rem;color:var(--ts);margin-bottom:48px;line-height:2" id="proj-toc"></div>
  <div id="proj-container"></div>
</div></section>

<div id="proj2-container" class="c" style="padding-bottom:60px"></div>

<!-- FOOTER -->
<footer><div class="c">
  <p class="th" id="footer-thanks"></p>
  <p class="ct" id="footer-contact"></p>
  <p class="mo" id="footer-motto"></p>
</div></footer>

<!-- VIDEO LIGHTBOX -->
<div class="vl-overlay" id="vl" style="display:none"><div class="vl-close">&times;</div><video id="vl-video" controls playsinline></video></div>

<script>
var chipIcons = [
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'
];
var checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

fetch('content.json').then(function(r){return r.json()}).then(function(d){
  // NAV
  document.getElementById('nav-name').innerHTML = d.nav.name + '<span>.</span>';
  var nk = document.getElementById('nav-links');
  nk.innerHTML = '<a href="#about">' + d.nav.links[0] + '</a><a href="#project">' + d.nav.links[1] + '</a>';

  // HERO
  document.getElementById('hero-badge').textContent = d.hero.badge;
  document.getElementById('hero-name').textContent = d.hero.name;
  document.getElementById('hero-name-en').textContent = d.hero.nameEn;
  document.getElementById('hero-intro').innerHTML = d.hero.intro;
  document.getElementById('hero-scroll').textContent = d.hero.scrollHint;
  var hc = document.getElementById('hero-chips');
  hc.innerHTML = d.hero.chips.map(function(t, i){
    return '<span class="chip">' + (chipIcons[i] || '') + t + '</span>';
  }).join('');

  // ABOUT
  document.getElementById('about-label').textContent = d.about.label;
  document.getElementById('about-title').textContent = d.about.title;

  var as = document.getElementById('about-sections');
  as.innerHTML = d.about.sections.map(function(s){
    return '<div class="ab a"><h3>' + s.heading + '</h3>' +
      s.paragraphs.map(function(p){ return '<p>' + p + '</p>'; }).join('') +
      '</div>';
  }).join('');

  var tl = document.getElementById('about-timeline');
  tl.innerHTML = d.about.timeline.map(function(t){
    var html = '<div class="ps"><div class="pn ' + t.stage + '"></div><div class="pi">' +
      '<div class="role">' + t.role + '</div>' +
      '<div class="per">' + t.period + '</div>' +
      '<div class="desc">' + t.desc + '</div>';
    if (t.current) html += '<div class="pcb"><span class="dot"></span> ' + t.currentLabel + '</div>';
    html += '</div></div>';
    return html;
  }).join('');

  // PROJECTS
  document.getElementById('proj-label').textContent = d.projects.label;
  document.getElementById('proj-title').textContent = d.projects.title;

  // TOC
  var toc = document.getElementById('proj-toc');
  toc.innerHTML = d.projects.items.map(function(p){
    return '<a href="#' + p.id + '" style="text-decoration:none;color:var(--tx);font-weight:600">· ' + p.name + '</a>';
  }).join('<br>');

  // Render projects
  d.projects.items.forEach(function(p, idx){
    var html = '';

    // Project 1 (banner image) vs Project 2+ (gradient header)
    if (p.banner) {
      html += '<div class="pc a" id="' + p.id + '">';
      html += '<div style="padding:0"><img src="' + p.banner + '" alt="' + p.name + '" style="width:100%;display:block;border-radius:var(--rs) var(--rs) 0 0"></div>';
    } else {
      html += '<div class="pc a" id="' + p.id + '" style="margin-top:0">';
      html += '<div class="pb" style="background:' + p.headerColor + '"><div class="pbi">';
      html += '<div class="ai" style="font-size:.75rem;font-weight:700;color:' + p.headerIconColor + ';background:rgba(255,255,255,.95)">' + p.headerIcon + '</div>';
      html += '<h3>' + p.name + '</h3>';
      if (p.subtitle) html += '<div class="sub">' + p.subtitle + '</div>';
      html += '</div></div>';
    }

    html += '<div class="pbd">';
    html += '<p class="po">' + p.overview + '</p>';

    // Screenshots (for proj2)
    if (p.screenshots) {
      html += '<div class="pst">畫面截圖</div>';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:36px">';
      p.screenshots.forEach(function(s){
        html += '<div style="background:var(--bg);border:1px solid var(--bl);border-radius:var(--rs);overflow:hidden;padding:12px">';
        html += '<img src="' + s.src + '" alt="' + s.alt + '" style="width:100%;border-radius:8px">';
        html += '<div style="font-size:.78rem;font-weight:600;color:var(--tx);text-align:center;margin-top:8px">' + s.caption + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    // Challenges
    html += '<div class="pst">核心挑戰與解決方式</div><div class="cg">';
    p.challenges.forEach(function(ch, i){
      html += '<div class="cc a"><div class="num">0' + (i + 1) + '</div><h4>' + ch.title + '</h4>';
      html += '<div class="prob">' + ch.problem + '</div>';
      html += '<div class="sol">' + ch.solution + '</div></div>';
    });
    html += '</div>';

    // Tech stacks
    html += '<div class="pst">技術使用</div><div class="cg">';
    p.techStacks.forEach(function(t){
      html += '<div class="tc a" style="border-top:3px solid ' + t.color + '">';
      html += '<h4>' + t.title + '</h4><p>' + t.desc + '</p>';
      html += '<div class="tt">' + t.tags.map(function(tg){ return '<span class="tg">' + tg + '</span>'; }).join('') + '</div>';
      html += '</div>';
    });
    html += '</div>';

    // Result
    html += '<div class="rb"><div class="ri">' + checkSvg + '</div>';
    html += '<div class="rt">' + p.result.title + '<span>' + p.result.subtitle + '</span></div></div>';

    // Demos (proj1 only)
    if (p.demos) {
      html += '<div class="pst" style="margin-top:36px">Demo</div>';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px">';
      p.demos.forEach(function(dm){
        html += '<div style="text-align:center">';
        html += '<div style="background:var(--bg);border:1px solid var(--bl);border-radius:var(--rs);overflow:hidden;padding:12px">';
        html += '<video class="dv" src="' + dm.src + '" autoplay muted loop playsinline preload="metadata" style="width:100%;border-radius:8px;background:#000;display:none"></video>';
        html += '<div class="dp" style="color:var(--tm);font-size:.75rem;padding:30px 0">影片準備中</div>';
        html += '</div>';
        html += '<div style="font-size:.82rem;font-weight:600;color:var(--tx);margin-top:10px">' + dm.label + '</div></div>';
      });
      html += '</div>';
    }

    html += '</div></div>';

    if (idx === 0) {
      document.getElementById('proj-container').innerHTML = html;
    } else {
      document.getElementById('proj2-container').innerHTML = html;
    }
  });

  // FOOTER
  document.getElementById('footer-thanks').textContent = d.footer.thanks;
  document.getElementById('footer-contact').innerHTML = d.footer.contact + ' · <a href="mailto:' + d.footer.email + '">' + d.footer.email + '</a> · ' + d.footer.phone;
  document.getElementById('footer-motto').textContent = d.footer.motto;

  // Init video loading handlers
  document.querySelectorAll('.dv').forEach(function(v){
    var p = v.nextElementSibling;
    v.addEventListener('loadedmetadata', function(){ v.style.display = 'block'; p.style.display = 'none'; });
    v.addEventListener('error', function(){ v.style.display = 'none'; p.style.display = 'block'; });
  });

  // Init video lightbox
  var overlay = document.getElementById('vl'), vid = document.getElementById('vl-video');
  document.querySelectorAll('.dv').forEach(function(v){
    v.addEventListener('click', function(){
      vid.src = v.src; overlay.style.display = 'flex';
      requestAnimationFrame(function(){ overlay.classList.add('show'); }); vid.play();
    });
  });
  function closeLightbox(){
    overlay.classList.remove('show');
    setTimeout(function(){ overlay.style.display = 'none'; vid.pause(); vid.src = ''; }, 300);
  }
  overlay.addEventListener('click', function(e){ if (e.target === overlay || e.target.classList.contains('vl-close')) closeLightbox(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && overlay.style.display === 'flex') closeLightbox(); });

  // Init scroll animations
  if ('IntersectionObserver' in window) {
    var obs = new IntersectionObserver(function(entries){
      entries.forEach(function(x){ if (x.isIntersecting) { x.target.classList.add('v'); obs.unobserve(x.target); } });
    }, { threshold: .08, rootMargin: '0px 0px -30px 0px' });
    document.querySelectorAll('.a').forEach(function(el){ obs.observe(el); });
  }
  setTimeout(function(){ document.querySelectorAll('.a').forEach(function(el){ el.classList.add('v'); }); }, 1500);
});

// Nav scroll effect
var n = document.getElementById('nav');
window.addEventListener('scroll', function(){ n.classList.toggle('scrolled', window.scrollY > 20); });
</script>
</body>
</html>
